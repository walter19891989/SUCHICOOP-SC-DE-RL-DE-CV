<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUCHICOOP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0b0f14;
  color: white;
  scroll-behavior: smooth;
}

/* NAV */
.nav {
  position: fixed;
  top: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

.nav-right a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 100px 40px;
  background: linear-gradient(120deg, #0b0f14, #0f3d2e);
}

.hero h1 {
  font-size: 55px;
}

.btn {
  margin-top: 25px;
  padding: 14px 30px;
  background: linear-gradient(90deg, #00ff88, #00c853);
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
}

/* CARD */
.hero-card {
  background: #111;
  padding: 30px;
  border-radius: 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
}

/* CONTADOR */
.stats {
  display: flex;
  justify-content: space-around;
  padding: 60px 20px;
  background: #111;
}

.stat h2 {
  color: #00ff88;
}

/* SERVICIOS */
.services {
  padding: 100px 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: #111;
  padding: 25px;
  border-radius: 15px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px);
  border: 1px solid #00ff88;
}

/* CONTACTO */
.contact {
  padding: 100px 40px;
  text-align: center;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00ff88;
  padding: 15px;
  border-radius: 50%;
  text-decoration: none;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero {
    flex-direction: column;
    text-align: center;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <strong>SUCHICOOP</strong>
  <div class="nav-right">
    <a href="#servicios">Servicios</a>
    <a href="#contacto">Contacto</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Finanzas modernas</h1>
    <p>Crece con respaldo real y seguro</p>

    <button class="btn" onclick="window.open('https://wa.me/50375678767?text=Hola,%20quiero%20información%20sobre%20créditos','_blank')">
      Solicitar por WhatsApp
    </button>
  </div>

  <div class="hero-card">
    <h3>✔ Seguro</h3>
    <p>✔ Rápido</p>
    <p>✔ Confiable</p>
  </div>
</div>

<!-- ESTADISTICAS -->
<div class="stats">
  <div class="stat">
    <h2 id="clientes">0</h2>
    <p>Clientes</p>
  </div>

  <div class="stat">
    <h2 id="creditos">0</h2>
    <p>Créditos</p>
  </div>

  <div class="stat">
    <h2 id="experiencia">0</h2>
    <p>Años</p>
  </div>
</div>

<!-- SERVICIOS -->
<div class="services" id="servicios">
  <h2>Servicios</h2>

  <div class="grid">
    <div class="card">Créditos de Consumo</div>
    <div class="card">Créditos Vivienda</div>
    <div class="card">Créditos Comercio</div>
    <div class="card">Ahorro</div>
  </div>
</div>

<!-- CONTACTO -->
<div class="contact" id="contacto">
  <h2>Contáctanos</h2>

  <button class="btn" onclick="window.open('https://wa.me/50375678767?text=Hola,%20quiero%20más%20información','_blank')">
    Escribir por WhatsApp
  </button>
</div>

<a href="https://wa.me/50375678767" class="whatsapp" target="_blank">💬</a>

<script>
// CONTADOR ANIMADO
function animar(id, max) {
  let i = 0;
  let intervalo = setInterval(() => {
    document.getElementById(id).innerText = i;
    i++;
    if (i > max) clearInterval(intervalo);
  }, 20);
}

animar("clientes", 500);
animar("creditos", 1200);
animar("experiencia", 10);
</script>

</body>
</html>
